<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MrQ Live · Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Archivo:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f0eee9;
    --paper-2:#e8e5dd;
    --ink:#1a1a1a;
    --ink-2:#3b3a36;
    --ink-3:#83807a;
    --line:#1a1a1a;
    --accent:#3b5bff;
    --accent-soft:#dbe1ff;
    --warn:#c97a2a;
    --warn-soft:#f7e2c4;
    --crit:#b53b3b;
    --ok:#3f7d3a;
    --hand: 'Kalam', cursive;
    --display: 'Archivo', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --note: 'Caveat', cursive;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; background:var(--paper); color:var(--ink); font-family: var(--hand); font-size: 14px; line-height: 1.4; }
  body{ background:
    repeating-linear-gradient(0deg, transparent 0 27px, rgba(58,90,255,.05) 27px 28px),
    var(--paper);
  }

  .topbar{ position: sticky; top: 0; z-index: 30; background: var(--paper);
    border-bottom: 2px solid var(--line);
    padding: 10px 18px; display: flex; align-items: center; gap: 18px;
  }
  .brand{ font-family: var(--display); font-weight: 900; font-size: 22px; letter-spacing: -0.5px; }
  .brand span.tag{ font-family: var(--note); font-weight:600; font-size: 18px; color: var(--ink-3); margin-left: 6px;}
  .topbar .seg{ display:inline-flex; border:2px solid var(--line); border-radius: 999px; padding:2px;}
  .topbar .seg button{ font-family: var(--hand); font-size: 13px; padding: 4px 14px; border:0; background: transparent; cursor: pointer; border-radius: 999px;}
  .topbar .seg button.on{ background: var(--ink); color: var(--paper); font-weight: 700; }
  .topbar .meta{ margin-left:auto; font-family: var(--note); font-size: 16px; color: var(--ink-3); }

  .subbar{ position: sticky; top: 50px; z-index: 25; background: var(--paper-2);
    border-bottom: 2px solid var(--line); padding: 6px 18px;
    display:flex; align-items:center; gap: 6px; overflow-x:auto; white-space: nowrap;
  }
  #screen-tabs{ display: flex; gap: 6px; }
  #screen-tabs button{
    font-family: var(--hand); font-size: 13px;
    border: 2px solid var(--line); background: var(--paper);
    padding: 4px 12px; border-radius: 4px;
    cursor: pointer;
    transform: rotate(-0.4deg);
  }
  #screen-tabs button:nth-child(2n){ transform: rotate(0.4deg); }
  #screen-tabs button.on{ background: #fef4a8; box-shadow: 2px 2px 0 var(--line); }

  .sk{ background: var(--paper); border: 2px solid var(--line); border-radius: 4px; padding: 10px 12px; position: relative; }
  .sk-thin{ border-width: 1.5px; }
  .sk-dash{ border-style: dashed; }
  .sk-soft{ background: var(--paper-2); }
  .sk-warn{ background: var(--warn-soft); border-color: var(--warn); }
  .sk-ghost{ background: transparent; border-style: dashed; }
  .sk-fill-ink{ background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .sk-fill-accent{ background: var(--accent); color: #fff; border-color: var(--accent); }

  .h{ font-family: var(--display); font-weight: 700; letter-spacing: -.3px; margin: 0; line-height: 1.1; }
  .h.h1{ font-size: 28px; font-weight: 900; }
  .h.h2{ font-size: 20px; font-weight: 700; }
  .h.h3{ font-size: 16px; font-weight: 700; }
  .body{ font-family: var(--hand); font-size: 14px; color: var(--ink-2); }
  .small{ font-family: var(--hand); font-size: 12px; color: var(--ink-2); }
  .lbl{ font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--ink-3); text-transform: uppercase; margin-top: 8px; display:block; }
  .mono{ font-family: var(--mono); font-size: 12px; }
  .counter{ font-family: var(--display); font-weight: 700; font-size: 28px; line-height: 1; color: var(--ink); }
  .counter.lg{ font-size: 44px; }

  .row{ display:flex; align-items:center; gap: 8px; }
  .row.stretch{ align-items: stretch; min-height: 700px; }

  .rule{ height: 0; border-top: 1.5px dashed var(--ink-3); margin: 12px 0; }
  .rule.with-or{ position:relative; }
  .rule.with-or span{ position: absolute; left:50%; top: -10px; transform: translateX(-50%); background: var(--paper); padding: 0 6px; font-family: var(--note); font-size: 14px; color: var(--ink-3); }

  .input{ border: 2px solid var(--line); padding: 8px 10px; border-radius: 4px; background: var(--paper); font-family: var(--hand); margin-bottom: 6px; min-height: 18px; }
  .input.lg{ padding: 14px 12px; font-size: 16px; }

  .btn{ font-family: var(--hand); font-weight: 700; padding: 8px 14px; border-radius: 4px; cursor: pointer; display:inline-flex; align-items:center; justify-content:center; border: 2px solid var(--line); transition: transform .08s; user-select: none; }
  .btn:hover{ transform: translate(-1px,-1px); box-shadow: 2px 2px 0 var(--line); }
  .btn-primary{ background: var(--accent); color: #fff; border-color: var(--line); }
  .btn-soft{ background: #fef4a8; }
  .btn-ghost{ background: transparent; }

  .check{ display: inline-block; width: 18px; height: 18px; border: 2px solid var(--line); border-radius: 3px; vertical-align: middle; flex: 0 0 18px; }
  .check.on{ background: var(--accent); position: relative; }
  .check.on::after{ content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }

  .pill{ font-family: var(--mono); font-size: 10px; letter-spacing: .8px; padding: 3px 8px; border: 1.5px solid var(--line); border-radius: 999px; background: var(--paper); text-transform: uppercase; display: inline-flex; align-items: center; gap: 4px; }
  .pill.on{ background: var(--ink); color: var(--paper); }
  .pill.p-live{ background: var(--ok); color: #fff; border-color: var(--ok); }
  .pill.p-verified{ background: var(--ok); color: #fff; border-color: var(--ok); }
  .pill.p-pending{ background: #fef4a8; }
  .pill.p-scheduled{ background: var(--accent-soft); }
  .pill.p-draft{ background: var(--paper-2); color: var(--ink-3); }
  .pill.p-ended{ background: var(--paper-2); color: var(--ink-3); }
  .pill.p-expired{ background: var(--warn-soft); border-color: var(--warn); }

  .vtag{ position: absolute; top: -10px; left: 12px; font-family: var(--note); font-size: 14px; padding: 2px 8px; background: #fef4a8; border: 1.5px solid var(--line); border-radius: 99px; transform: rotate(-1.5deg); z-index: 5; }

  .note{ font-family: var(--note); font-size: 16px; color: var(--ink-2); margin-top: 8px; line-height: 1.3; padding-left: 8px; border-left: 3px solid #fef4a8; }
  .squig{ text-decoration: underline wavy; text-underline-offset: 3px; cursor: pointer; }

  .phone{ width: 280px; min-height: 560px; margin: 12px auto 6px; background: var(--paper); border: 2.5px solid var(--line); border-radius: 32px; box-shadow: 4px 4px 0 var(--line); padding: 6px; position: relative; overflow: hidden; }
  .phone .notch{ width: 80px; height: 16px; background: var(--ink); border-radius: 0 0 14px 14px; margin: 0 auto; }
  .phone .status{ display:flex; justify-content:space-between; align-items:center; padding: 4px 14px; font-family: var(--mono); font-size: 10px; color: var(--ink-3); }
  .phone .body-area{ padding: 6px 14px 14px; }
  .phone .home-bar{ position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 110px; height: 4px; background: var(--ink); border-radius: 999px; }

  /* ── HQ shell · mirrors src/components/shared/layouts/page-layout.tsx ── */
  .hq-shell{ background: var(--paper); border: 2px solid var(--line); border-radius: 6px; overflow: hidden; box-shadow: 4px 4px 0 var(--line); }
  .hq-header{ display:flex; align-items:center; justify-content:space-between; padding: 10px 16px; background: var(--paper-2); border-bottom: 2px solid var(--line); }
  .hq-icon-btn{ width: 30px; height: 30px; border: 1.5px solid var(--line); border-radius: 4px; display:flex; align-items:center; justify-content:center; background: var(--paper); }
  .hq-brand{ margin-left: 10px; line-height: 1; }
  .hq-brand-1{ font-family: var(--display); font-weight: 900; font-size: 20px; }
  .hq-brand-2{ font-family: var(--hand); font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .hq-avatar{ width: 30px; height: 30px; background: var(--accent); color: #fff; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-family: var(--display); font-size: 12px; font-weight: 700; border: 1.5px solid var(--line); }
  .hq-body{ display: flex; min-height: 700px; }
  .hq-sidebar{ width: 240px; background: var(--paper-2); border-right: 2px solid var(--line); display: flex; flex-direction: column; }
  .hq-nav-group{ margin-top: 4px; }
  .hq-nav-grouphead{ display:flex; align-items:center; padding: 8px 14px 4px; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--ink-3); }
  .hq-nav-item{ font-family: var(--hand); font-size: 13px; padding: 5px 14px 5px 24px; cursor: pointer; }
  .hq-nav-item.on{ background: var(--paper); border-left: 3px solid var(--accent); padding-left: 21px; font-weight: 700; }
  .hq-nav-item.small-pad{ padding: 5px 14px; }
  .hq-main{ flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .hq-crumbs{ padding: 12px 24px 0; font-family: var(--mono); font-size: 11px; color: var(--ink-3); display:flex; gap: 6px; }
  .hq-crumbs .sep{ color: var(--ink-3); }
  .hq-crumbs .on{ color: var(--ink); }
  .hq-content{ padding: 14px 24px 24px; flex: 1; }

  .signin-stage{ min-height: 700px; display:flex; align-items:center; justify-content:center; padding: 30px; background:
    repeating-linear-gradient(0deg, transparent 0 27px, rgba(58,90,255,.04) 27px 28px),
    var(--paper);
  }
  .card{ background: var(--paper); border: 2px solid var(--line); border-radius: 8px; padding: 28px; box-shadow: 4px 4px 0 var(--line); }
  .card.narrow{ width: 380px; }

  .tbl{ width: 100%; border-collapse: collapse; font-family: var(--hand); font-size: 13px; }
  .tbl th{ text-align:left; padding: 8px 12px; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-3); border-bottom: 1.5px solid var(--line); }
  .tbl td{ padding: 8px 12px; border-bottom: 1px dashed #d4d0c4; vertical-align: middle; }
  .tbl tr:last-child td{ border-bottom: none; }

  .scrib{ height: 8px; background: linear-gradient(90deg, transparent, #b9b6ad 4px, transparent 6px), repeating-linear-gradient(-1deg, transparent 0 5px, #b9b6ad 5px 6px); border-radius: 2px; margin: 6px 0; }
  .scrib.long{ width: 100%; }
  .scrib.med{ width: 70%; }
  .scrib.short{ width: 40%; }

  .otp{ display:flex; gap: 6px; justify-content: center; }
  .otp-slot{ width: 36px; height: 50px; border: 2px solid var(--line); border-radius: 6px; display:flex; align-items:center; justify-content:center; font-family: var(--display); font-size: 22px; font-weight: 700; background: var(--paper); }

  .mrq{ font-family: var(--display); font-weight: 900; font-size: 22px; }

  .design-canvas-root{ height: calc(100vh - 90px); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">MrQ <span class="tag">live · wireframes</span></div>
    <div class="seg" id="surface-toggle">
      <button data-surface="participant" class="on">Participant</button>
      <button data-surface="admin">Admin</button>
    </div>
    <div class="meta">v0.2 · curated cut · brand activations · no gambling</div>
  </div>
  <div class="subbar">
    <span class="lbl" style="margin: 0 8px 0 0">SCREEN</span>
    <div id="screen-tabs"></div>
  </div>
  <div id="root" class="design-canvas-root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="wireframes-participant.jsx"></script>
  <script type="text/babel" src="wireframes-admin.jsx"></script>
  <script type="text/babel" src="wireframes-app.jsx"></script>
</body>
</html>
