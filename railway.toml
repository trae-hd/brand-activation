[build]
builder = "NIXPACKS"
# `--prod=false` forces pnpm to install devDependencies even though Nixpacks
# sets NODE_ENV=production. We need them at build time (typescript, @types/*,
# tsx, etc.) but not at runtime — Next.js tree-shakes the production bundle so
# they don't leak into the deployed image.
buildCommand = "pnpm install --frozen-lockfile --prod=false && SKIP_ENV_VALIDATION=1 pnpm build"

[deploy]
startCommand = "pnpm prisma migrate deploy && pnpm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
